# ~/.tmux.conf
# ---------------------------------------------------------------------------
# Terminal / colors
# ---------------------------------------------------------------------------
# 256-color terminal + truecolor passthrough so nvim's termguicolors themes
# render accurately inside tmux.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# ---------------------------------------------------------------------------
# Prefix: C-b -> C-t  (double-tap C-t = last window)
# ---------------------------------------------------------------------------
unbind C-b
set -g prefix C-t
bind C-t last-window

# ---------------------------------------------------------------------------
# General behavior
# ---------------------------------------------------------------------------
set -sg escape-time 0          # no lag after pressing ESC (matters in nvim)
set -g history-limit 10000     # larger scrollback buffer
set -g focus-events on         # let nvim react to focus (autoread, etc.)
set -g mouse on                # scroll / click panes / drag to resize
setw -g mode-keys vi           # vi keybindings in copy mode

# Number windows & panes from 1; keep them renumbered after closing.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ---------------------------------------------------------------------------
# Status bar / appearance
# ---------------------------------------------------------------------------
set -g window-status-current-style "bg=cyan,fg=black,bold"
set -g pane-active-border-style "fg=yellow"

# ---------------------------------------------------------------------------
# Splits (open new pane in the current pane's directory)
# ---------------------------------------------------------------------------
bind s split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"

# ---------------------------------------------------------------------------
# Pane resizing
# ---------------------------------------------------------------------------
bind > resize-pane -R 3
bind < resize-pane -L 3
bind + resize-pane -U 3
bind - resize-pane -D 3

# ---------------------------------------------------------------------------
# Seamless navigation between nvim splits and tmux panes
# (pairs with christoomey/vim-tmux-navigator on the nvim side)
# https://github.com/christoomey/vim-tmux-navigator
# ---------------------------------------------------------------------------
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
# Same movement while inside copy mode
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R
# C-l no longer clears the screen (taken by nav) -> restore via prefix C-l
bind C-l send-keys 'C-l'

# ---------------------------------------------------------------------------
# Copy mode (vi-style selection -> macOS system clipboard)
# ---------------------------------------------------------------------------
bind -T copy-mode-vi v     send -X begin-selection
bind -T copy-mode-vi y     send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# ---------------------------------------------------------------------------
# Windows: prompt for a name on creation, open in current path
# ---------------------------------------------------------------------------
bind c command-prompt -p "window name:" "new-window -c '#{pane_current_path}' -n '%%'"

# ---------------------------------------------------------------------------
# Reload this config
# ---------------------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
